<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Menu QR Gọi Món ProMax Final</title>
  <style>
    :root{
      --bg:#0f0f10;
      --card:#18181b;
      --soft:#232326;
      --line:#2d2d31;
      --text:#f5f5f5;
      --muted:#a1a1aa;
      --primary:#ffb400;
      --danger:#ef4444;
      --success:#22c55e;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,sans-serif;
      overflow-x:hidden;
      overscroll-behavior-x:none;
    }

    body{
      padding-bottom:108px;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body.drawer-open{
      overflow:hidden;
      touch-action:none;
    }

    .topbar{
      background:rgba(15,15,16,.96);
      border-bottom:1px solid var(--line);
      padding:12px;
      position:sticky;
      top:0;
      z-index:1100;
      backdrop-filter:blur(10px);
    }

    .brand{
      font-size:20px;
      font-weight:700;
      color:var(--primary);
      margin-bottom:10px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .input, .textarea{
      width:100%;
      background:var(--card);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      font-size:15px;
      outline:none;
      appearance:none;
    }

    .input:focus, .textarea:focus{
      border-color:rgba(255,180,0,.75);
      box-shadow:0 0 0 3px rgba(255,180,0,.12);
    }

    .textarea{
      resize:vertical;
      min-height:76px;
    }

    .tabs-wrap{
      position:sticky;
      top:72px;
      z-index:1050;
      background:rgba(15,15,16,.98);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px);
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:10px 12px;
      -webkit-overflow-scrolling:touch;
      white-space:nowrap;
      scroll-behavior:smooth;
      scrollbar-width:none;
    }

    .tabs::-webkit-scrollbar{ display:none; }

    .tab-btn{
      flex:0 0 auto;
      border:none;
      background:var(--soft);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, color .16s ease;
      white-space:nowrap;
    }

    .tab-btn:active{ transform:scale(.98); }

    .tab-btn.active{
      background:var(--primary);
      color:#111;
      box-shadow:0 0 0 2px rgba(255,180,0,.15);
    }

    .content{
      padding:12px;
      min-height:58vh;
      overscroll-behavior-y:contain;
      touch-action:pan-y pinch-zoom;
    }

    .section{ margin-bottom:20px; }

    .section-title{
      font-size:18px;
      font-weight:700;
      color:var(--primary);
      margin:6px 0 12px;
      padding-left:10px;
      border-left:4px solid var(--primary);
    }

    .swipe-hint{
      color:var(--muted);
      font-size:12px;
      margin:-2px 0 12px 2px;
      user-select:none;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease;
      box-shadow:0 1px 0 rgba(255,255,255,.02);
    }

    .item:active,
    .cart-item:active{
      transform:scale(.986);
      border-color:rgba(255,180,0,.36);
    }

    .item-left{ flex:1; min-width:0; }
    .item-name{ font-size:16px; font-weight:700; margin-bottom:6px; }
    .item-meta{ font-size:13px; color:var(--muted); }
    .price{ color:var(--primary); font-weight:700; }

    .item-right{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-end;
      gap:10px;
    }

    .qty{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .qty button{
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#111;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease;
      touch-action:manipulation;
    }

    .qty button:active{ transform:scale(.94); }
    .qty button:disabled{ opacity:.5; cursor:not-allowed; }

    .count{
      min-width:24px;
      text-align:center;
      font-size:16px;
      font-weight:700;
      color:var(--primary);
    }

    .sold-out{ opacity:.45; pointer-events:none; }

    .sold-out-badge{
      display:inline-block;
      margin-top:6px;
      color:#111;
      background:#f59e0b;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:700;
    }

    .cart-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:1200;
      background:rgba(20,20,22,.96);
      border-top:2px solid var(--primary);
      box-shadow:0 -10px 30px rgba(0,0,0,.35);
      padding:12px;
      display:none;
      backdrop-filter:blur(12px);
    }

    .cart-bar-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .cart-summary{ display:flex; flex-direction:column; gap:4px; min-width:0; }
    .cart-summary strong{ color:var(--primary); font-size:16px; }
    .cart-summary span{ color:var(--muted); font-size:13px; }

    .primary-btn, .ghost-btn{
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .14s ease, opacity .14s ease;
      touch-action:manipulation;
    }
    .primary-btn:active, .ghost-btn:active{ transform:scale(.98); }

    .primary-btn{ background:var(--primary); color:#111; }
    .primary-btn:disabled{ opacity:.6; cursor:not-allowed; }
    .ghost-btn{ background:var(--soft); color:var(--text); }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.56);
      display:none;
      z-index:1300;
      padding:14px;
      opacity:0;
      transition:opacity .18s ease;
      overscroll-behavior:contain;
    }

    .overlay.show{ display:block; opacity:1; }

    .drawer{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      max-height:80vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      transform:translateY(22px);
      opacity:.92;
      transition:transform .2s ease, opacity .2s ease;
      box-shadow:var(--shadow);
    }

    .overlay.show .drawer{
      transform:translateY(0);
      opacity:1;
    }

    .drawer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      position:sticky;
      top:-14px;
      background:var(--card);
      padding-top:2px;
      z-index:2;
    }

    .drawer-title{ font-size:18px; font-weight:700; color:var(--primary); }
    .icon-btn{ border:none; background:transparent; color:var(--text); font-size:24px; cursor:pointer; }

    .cart-list{ display:flex; flex-direction:column; gap:10px; margin:12px 0; }

    .cart-item{
      background:var(--soft);
      border:1px solid transparent;
      border-radius:14px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      transition:transform .14s ease, border-color .14s ease;
    }

    .cart-item-name{ font-weight:700; margin-bottom:6px; }
    .cart-item-sub{ color:var(--muted); font-size:13px; }
    .empty{ color:var(--muted); text-align:center; padding:20px 10px; }

    .totals{
      border-top:1px solid var(--line);
      padding-top:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .total-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:15px;
    }

    .total-row strong{ color:var(--primary); font-size:18px; }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .status{ margin-top:10px; font-size:13px; color:var(--muted); min-height:18px; }
    .status.ok{ color:var(--success); }
    .status.err{ color:var(--danger); }

    @media (min-width: 768px){
      .topbar, .tabs-wrap, .content, .cart-bar{
        max-width:640px;
        margin:0 auto;
      }
      .overlay{ max-width:640px; margin:0 auto; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Menu QR gọi món ProMax</div>
    <div class="controls">
      <input
        id="tableName"
        type="text"
        list="tableSuggestions"
        class="input"
        placeholder="Nhập tên bàn, ví dụ: Bàn 1 / Bàn sân / Lộc vừng trái"
      />
      <datalist id="tableSuggestions">
        <option value="Bàn 1"></option>
        <option value="Bàn 2"></option>
        <option value="Bàn 3"></option>
        <option value="Bàn 4"></option>
        <option value="Lộc vừng trái"></option>
        <option value="Lộc vừng phải"></option>
      </datalist>
    </div>
  </div>

  <div class="tabs-wrap">
    <div id="tabs" class="tabs"></div>
  </div>

  <div id="content" class="content"></div>

  <div id="cartBar" class="cart-bar">
    <div class="cart-bar-inner">
      <div class="cart-summary">
        <strong id="cartCountText">0 món</strong>
        <span id="cartTotalText">Tạm tính: 0đ</span>
      </div>
      <button class="primary-btn" id="openCartBtn">Xem giỏ hàng</button>
    </div>
  </div>

  <div id="cartOverlay" class="overlay" aria-hidden="true">
    <div class="drawer">
      <div class="drawer-head">
        <div class="drawer-title">Giỏ hàng</div>
        <button class="icon-btn" id="closeCartBtn" aria-label="Đóng">×</button>
      </div>

      <div id="cartList" class="cart-list"></div>

      <div style="margin:12px 0 10px;">
        <textarea id="cartNote" class="textarea" rows="2" placeholder="Ghi chú đơn, ví dụ: ít cay, lên sau..."></textarea>
      </div>

      <div class="totals">
        <div class="total-row">
          <span>Tổng số phần</span>
          <span id="drawerQty">0</span>
        </div>
        <div class="total-row">
          <span>Tạm tính</span>
          <strong id="drawerTotal">0đ</strong>
        </div>
      </div>

      <div class="actions">
        <button class="ghost-btn" id="clearCartBtn">Xóa giỏ hàng</button>
        <button class="primary-btn" id="sendOrderBtn">Gửi nhà bếp</button>
      </div>

      <div id="sendStatus" class="status"></div>
    </div>
  </div>

        { id: "luoi_lon_tran", name: "Lưỡi lợn trần", price: 130000, available: true },
        { id: "quai_lac_tran", name: "Quai lạc trần", price: 130000, available: true }

      { id: "nuong", name: "Nướng", items: [

        { id: "rau_xao", name: "Rau xào", price: 40000, available: true },

        { id: "lau_xuong_dau", name: "Lẩu xương đầu", price: 400000, available: true }
      ]},
      { id: "com_my", name: "Cơm mỳ", items: [
        { id: "com_rang_thap_cam", name: "Cơm rang thập cẩm", price: 60000, available: true },
        { id: "com_rang_dua_bo", name: "Cơm rang dưa bò", price: 80000, available: true },
        { id: "com_rang_hai_san", name: "Cơm rang hải sản", price: 100000, available: true },
        { id: "mi_xao", name: "Mì xào", price: 60000, available: true },
        { id: "canh_chua_ca_ria", name: "Canh chua cá rìa", price: 100000, available: true },
        { id: "canh_trung", name: "Canh trứng", price: 60000, available: true }
      ]},
      { id: "do_uong", name: "Đồ uống", items: [
        { id: "bia_hoi", name: "Bia hơi", price: 8000, available: true },
        { id: "bia_lon", name: "Bia lon", price: 13000, available: true },
        { id: "bia_chai", name: "Bia chai", price: 14000, available: true },
        { id: "nuoc_ngot", name: "Nước ngọt", price: 15000, available: true },
        { id: "nuoc_loc", name: "Nước lọc", price: 10000, available: true },
        { id: "ruou", name: "Rượu", price: 30000, available: true },
        { id: "thuoc_la", name: "Thuốc lá", price: 20000, available: true }
      ]}
    ];

    const LS_CART_KEY = "qr_menu_cart_v7";
    const LS_TABLE_KEY = "qr_menu_table_v7";
    const LS_NOTE_KEY = "qr_menu_note_v7";

    let cart = {};
    let sending = false;
    let activeCategoryId = MENU[0]?.id || "";
    let swipeState = { x: 0, y: 0, dragging: false, locked: "", handled: false };

    const money = (n) => new Intl.NumberFormat("vi-VN").format(n) + "đ";

    function buildMenuIndex() {
      const map = {};
      MENU.forEach(category => {
        category.items.forEach(item => {
          map[item.id] = { ...item, categoryId: category.id, categoryName: category.name };
        });
      });
      return map;
    }

    const MENU_INDEX = buildMenuIndex();

    function generateOrderId() {
      return "OD" + Date.now() + Math.floor(Math.random() * 1000);
    }

    function sanitizeSheetName(name) {
      return String(name || "Bàn chưa đặt").replace(/[\\/?*\[\]:]/g, "-").trim().slice(0, 80) || "Bàn chưa đặt";
    }

    function buildSummary(items) {
      return items.map(i => `${i.name} x${i.qty}`).join(" | ");
    }

    function buildSpeechText(tableName, items, note) {
      const itemText = items.map(i => `${i.name} ${i.qty} phần`).join(", ");
      const noteText = note ? `. Ghi chú: ${note}` : "";
      return `Có đơn mới từ ${tableName}. ${itemText}${noteText}`;
    }

    function saveState() {
      localStorage.setItem(LS_CART_KEY, JSON.stringify(cart));
      localStorage.setItem(LS_TABLE_KEY, document.getElementById("tableName").value);
      localStorage.setItem(LS_NOTE_KEY, document.getElementById("cartNote").value);
    }

    function loadState() {
      try { cart = JSON.parse(localStorage.getItem(LS_CART_KEY) || "{}"); }
      catch { cart = {}; }

      const tableValue = localStorage.getItem(LS_TABLE_KEY);
      const noteValue = localStorage.getItem(LS_NOTE_KEY);
      if (tableValue) document.getElementById("tableName").value = tableValue;
      if (noteValue) document.getElementById("cartNote").value = noteValue;
    }

    function updateActiveTab() {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === activeCategoryId);
      });
      const activeBtn = document.querySelector(`.tab-btn[data-tab="${activeCategoryId}"]`);
      if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = MENU.map(category => `
        <button class="tab-btn ${category.id === activeCategoryId ? "active" : ""}" data-tab="${category.id}">${category.name}</button>
      `).join("");
    }

    function renderContent() {
      const content = document.getElementById("content");
      const current = MENU.find(x => x.id === activeCategoryId) || MENU[0];
      content.innerHTML = `
        <div class="section" id="current-section">
          <div class="section-title">${current.name}</div>
          <div class="swipe-hint">Vuốt ngang nhẹ ở vùng món để đổi mục. Cuộn dọc vẫn giữ nguyên vị trí, không nhảy tab.</div>
          <div class="list">
            ${current.items.map(item => {
              const qty = cart[item.id]?.qty || 0;
              return `
                <div class="item ${item.available ? "" : "sold-out"}">
                  <div class="item-left">
                    <div class="item-name">${item.name}</div>
                    <div class="item-meta"><span class="price">${money(item.price)}</span></div>
                    ${item.available ? "" : '<div class="sold-out-badge">Hết món</div>'}
                  </div>
                  <div class="item-right">
                    <div class="qty">
                      <button ${!item.available ? "disabled" : ""} data-action="minus" data-id="${item.id}">-</button>
                      <span class="count">${qty}</span>
                      <button ${!item.available ? "disabled" : ""} data-action="add" data-id="${item.id}">+</button>
                    </div>
                  </div>
                </div>`;
            }).join("")}
          </div>
        </div>`;
    }

    function goToTabByIndex(index) {
      if (index < 0 || index >= MENU.length) return;
      activeCategoryId = MENU[index].id;
      updateActiveTab();
      renderContent();
    }

    function goNextTab() {
      const idx = MENU.findIndex(x => x.id === activeCategoryId);
      if (idx < MENU.length - 1) goToTabByIndex(idx + 1);
    }

    function goPrevTab() {
      const idx = MENU.findIndex(x => x.id === activeCategoryId);
      if (idx > 0) goToTabByIndex(idx - 1);
    }

    function setupSwipeOnce() {
      const content = document.getElementById("content");
      if (!content || content.dataset.swipeBound === "1") return;

      content.addEventListener("touchstart", (e) => {
        if (document.body.classList.contains("drawer-open")) return;
        const t = e.touches[0];
        swipeState = { x: t.clientX, y: t.clientY, dragging: true, locked: "", handled: false };
      }, { passive: true });

      content.addEventListener("touchmove", (e) => {
        if (!swipeState.dragging || swipeState.handled || !e.touches?.length) return;
        const t = e.touches[0];
        const dx = t.clientX - swipeState.x;
        const dy = t.clientY - swipeState.y;
        const ax = Math.abs(dx);
        const ay = Math.abs(dy);

        if (!swipeState.locked) {
          if (ax > 14 || ay > 14) {
            swipeState.locked = ax > ay * 1.35 ? "x" : "y";
          }
        }

        if (swipeState.locked === "x" && ax > 56 && ay < 42) {
          swipeState.handled = true;
          if (dx < 0) goNextTab();
          else goPrevTab();
        }
      }, { passive: true });

      const endSwipe = () => {
        swipeState.dragging = false;
        swipeState.locked = "";
        swipeState.handled = false;
      };

      content.addEventListener("touchend", endSwipe, { passive: true });
      content.addEventListener("touchcancel", endSwipe, { passive: true });
      content.dataset.swipeBound = "1";
    }

    function addItem(itemId) {
      const item = MENU_INDEX[itemId];
      if (!item || !item.available) return;
      if (!cart[itemId]) cart[itemId] = { id: item.id, name: item.name, price: item.price, qty: 0 };
      cart[itemId].qty += 1;
      saveState();
      refreshUI();
    }

    function minusItem(itemId) {
      if (!cart[itemId]) return;
      cart[itemId].qty -= 1;
      if (cart[itemId].qty <= 0) delete cart[itemId];
      saveState();
      refreshUI();
    }

    function clearCart() {
      cart = {};
      saveState();
      refreshUI();
    }

    function getCartItems() {
      return Object.values(cart).filter(i => i.qty > 0);
    }

    function getTotals() {
      const items = getCartItems();
      const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
      const totalPrice = items.reduce((sum, i) => sum + i.qty * i.price, 0);
      return { totalQty, totalPrice, items };
    }

    function renderCartBar() {
      const bar = document.getElementById("cartBar");
      const { totalQty, totalPrice } = getTotals();
      document.getElementById("cartCountText").innerText = `${totalQty} món`;
      document.getElementById("cartTotalText").innerText = `Tạm tính: ${money(totalPrice)}`;
      bar.style.display = totalQty > 0 ? "block" : "none";
    }

    function renderCartDrawer() {
      const list = document.getElementById("cartList");
      const { totalQty, totalPrice, items } = getTotals();
      if (items.length === 0) {
        list.innerHTML = `<div class="empty">Chưa có món nào trong giỏ hàng.</div>`;
      } else {
        list.innerHTML = items.map(item => `
          <div class="cart-item">
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-sub">${money(item.price)} x ${item.qty}</div>
            </div>
            <div class="qty">
              <button data-action="minus-cart" data-id="${item.id}">-</button>
              <span class="count">${item.qty}</span>
              <button data-action="add-cart" data-id="${item.id}">+</button>
            </div>
          </div>`).join("");
      }
      document.getElementById("drawerQty").innerText = totalQty;
      document.getElementById("drawerTotal").innerText = money(totalPrice);
    }

    function refreshUI() {
      renderTabs();
      updateActiveTab();
      renderContent();
      renderCartBar();
      renderCartDrawer();
    }

    function openCart() {
      const overlay = document.getElementById("cartOverlay");
      overlay.style.display = "block";
      requestAnimationFrame(() => overlay.classList.add("show"));
      document.body.classList.add("drawer-open");
      overlay.setAttribute("aria-hidden", "false");
      renderCartDrawer();
    }

    function closeCart() {
      const overlay = document.getElementById("cartOverlay");
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      setTimeout(() => {
        if (!overlay.classList.contains("show")) overlay.style.display = "none";
      }, 180);
      document.body.classList.remove("drawer-open");
      setStatus("");
    }

    function setStatus(text, type = "") {
      const el = document.getElementById("sendStatus");
      el.className = "status" + (type ? " " + type : "");
      el.innerText = text || "";
    }

    function validateBeforeSend() {
      const tableName = document.getElementById("tableName").value.trim();
      const { items } = getTotals();
      if (!tableName) {
        setStatus("Vui lòng nhập tên bàn trước khi gửi.", "err");
        return false;
      }
      if (items.length === 0) {
        setStatus("Giỏ hàng đang trống.", "err");
        return false;
      }
      return true;
    }

    async function sendOrder() {
      if (sending) return;
      if (!validateBeforeSend()) return;

      sending = true;
      const btn = document.getElementById("sendOrderBtn");
      btn.disabled = true;
      btn.innerText = "Đang gửi...";

      const tableName = sanitizeSheetName(document.getElementById("tableName").value.trim());
      const note = document.getElementById("cartNote").value.trim();
      const { items, totalQty, totalPrice } = getTotals();
      const summaryText = buildSummary(items);
      const speechText = buildSpeechText(tableName, items, note);

      const payload = {
        order_id: generateOrderId(),
        table_name: tableName,
        note,
        total_qty: totalQty,
        total_price: totalPrice,
        created_at: new Date().toISOString(),
        items_text: summaryText,
        speech_text: speechText,
        items: items.map(i => ({
          item_id: i.id,
          item_name: i.name,
          qty: i.qty,
          unit_price: i.price,
          line_total: i.qty * i.price
        }))
      };

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || data.status !== "success") throw new Error(data.message || "Gửi đơn thất bại");

        setStatus(`Đã gửi thành công. Sheet bàn: "${data.sheet_name || tableName}", sheet tổng: "${data.summary_sheet || 'TONG_HOP'}".`, "ok");
        cart = {};
        saveState();
        refreshUI();
        setTimeout(closeCart, 900);
      } catch (err) {
        setStatus(err.message || "Lỗi mạng, chưa gửi được đơn.", "err");
      } finally {
        sending = false;
        btn.disabled = false;
        btn.innerText = "Gửi nhà bếp";
      }
    }

    function bindEvents() {
      document.getElementById("tabs").addEventListener("click", (e) => {
        const btn = e.target.closest(".tab-btn[data-tab]");
        if (!btn) return;
        activeCategoryId = btn.dataset.tab;
        updateActiveTab();
        renderContent();
      });

      document.getElementById("openCartBtn").addEventListener("click", openCart);
      document.getElementById("closeCartBtn").addEventListener("click", closeCart);
      document.getElementById("cartOverlay").addEventListener("click", (e) => {
        if (e.target.id === "cartOverlay") closeCart();
      });
      document.getElementById("clearCartBtn").addEventListener("click", clearCart);
      document.getElementById("sendOrderBtn").addEventListener("click", sendOrder);
      document.getElementById("tableName").addEventListener("input", saveState);
      document.getElementById("cartNote").addEventListener("input", saveState);

      document.getElementById("content").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action][data-id]");
        if (!btn) return;
        const { action, id } = btn.dataset;
        if (action === "add") addItem(id);
        if (action === "minus") minusItem(id);
      });

      document.getElementById("cartList").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action][data-id]");
        if (!btn) return;
        const { action, id } = btn.dataset;
        if (action === "add-cart") addItem(id);
        if (action === "minus-cart") minusItem(id);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeCart();
      });
    }

    function init() {
      loadState();
      bindEvents();
      refreshUI();
      setupSwipeOnce();
    }

    init();
  </script>
</body>
</html>
